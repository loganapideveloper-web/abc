name: Deploy to Vercel Repos

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Sync frontend to Vercel repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push frontend/ to whatapi00-max/frontend-demo-1
        run: |
          git config user.email "deploy@amoha.com"
          git config user.name "Deploy Bot"
          git remote add frontend-target https://whatapi00-max:${{ secrets.DEPLOY_TOKEN }}@github.com/whatapi00-max/frontend-demo-1.git
          git subtree split --prefix=frontend -b frontend-split
          git push frontend-target frontend-split:main --force
          git branch -D frontend-split

  deploy-admin:
    name: Sync admin to Vercel repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push admin/ to whatapi00-max/admin
        run: |
          git config user.email "deploy@amoha.com"
          git config user.name "Deploy Bot"
          git remote add admin-target https://whatapi00-max:${{ secrets.DEPLOY_TOKEN }}@github.com/whatapi00-max/admin.git
          git subtree split --prefix=admin -b admin-split
          git push admin-target admin-split:main --force
          git branch -D admin-split
